name: RPM release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build-ubi:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-26.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: registry.access.redhat.com/ubi10/ubi:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and package in Red Hat UBI 10
        run: |
          dnf install -y cargo rust rpm-build systemd-rpm-macros
          cargo build --release
          rpmbuild -bb packaging/rhc-bot.spec \
            --define "version ${GITHUB_REF_NAME#v}" \
            --define "binary $PWD/target/release/rhc-bot" \
            --define "service $PWD/packaging/rhc-bot.service" \
            --define "_rpmdir $PWD/dist"
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: dist/**/*.rpm
  build-riscv:
    runs-on: ubuntu-24.04-riscv
    container:
      image: rockylinux/rockylinux:10
    steps:
      - uses: actions/checkout@v4
      - run: uname -m
      - name: Build and package in Rocky Linux 10
        run: |
          dnf install -y cargo rust rpm-build systemd-rpm-macros
          cargo build --release
          rpmbuild -bb packaging/rhc-bot.spec \
            --define "version ${GITHUB_REF_NAME#v}" \
            --define "binary $PWD/target/release/rhc-bot" \
            --define "service $PWD/packaging/rhc-bot.service" \
            --define "_rpmdir $PWD/dist"
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-riscv64
          path: dist/**/*.rpm
  release:
    needs: [build-ubi, build-riscv]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.rpm